<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Cetak Struk Web Serial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .struk-preview {
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md z-10 flex flex-col md:flex-row justify-between items-center gap-4">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-receipt"></i> Aplikasi Cetak Struk Thermal
        </h1>
        <!-- Tombol untuk koneksi printer -->
        <div class="flex gap-2">
            <button id="connectSerialBtn" class="bg-white text-blue-600 px-4 py-2 rounded-md font-semibold hover:bg-blue-50 transition flex items-center gap-2 text-sm shadow-sm">
                <i class="fa-brands fa-usb"></i> USB / COM
            </button>
            <button id="connectBleBtn" class="bg-white text-blue-600 px-4 py-2 rounded-md font-semibold hover:bg-blue-50 transition flex items-center gap-2 text-sm shadow-sm">
                <i class="fa-brands fa-bluetooth"></i> Bluetooth
            </button>
        </div>
    </header>

    <!-- Status Bar -->
    <div id="statusBanner" class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-3 text-sm flex items-center gap-2">
        <i class="fa-solid fa-circle-info"></i> <span id="statusText">Printer belum terhubung. Pilih koneksi USB/COM (Serial) atau Bluetooth (BLE).</span>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-hidden flex flex-col md:flex-row max-w-7xl w-full mx-auto p-4 gap-6">
        
        <!-- Kolom Kiri: Form Input -->
        <div class="w-full md:w-1/2 lg:w-3/5 flex flex-col gap-4 overflow-y-auto pr-2 pb-20 md:pb-0">
            
            <!-- Pengaturan Toko -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold mb-4 text-gray-700 border-b pb-2">Informasi Toko</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Nama Toko</label>
                        <input type="text" id="storeName" value="TOKO BERKAH JAYA" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Alamat</label>
                        <input type="text" id="storeAddress" value="Jl. Merdeka No.45, Jakarta" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">No. Telp</label>
                        <input type="text" id="storePhone" value="0812-3456-7890" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Kasir</label>
                        <input type="text" id="cashierName" value="Admin" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                </div>
            </div>

            <!-- Tambah Item -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex-1 flex flex-col">
                <h2 class="text-lg font-semibold mb-4 text-gray-700 border-b pb-2">Daftar Belanja</h2>
                
                <form id="itemForm" class="flex flex-col md:flex-row gap-3 mb-4 items-end">
                    <div class="flex-1 w-full md:w-auto">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Nama Barang</label>
                        <input type="text" id="itemName" required placeholder="Contoh: Kopi Susu" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div class="w-full md:w-32">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Harga (Rp)</label>
                        <input type="number" id="itemPrice" required min="0" placeholder="0" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div class="w-full md:w-24">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Qty</label>
                        <input type="number" id="itemQty" required min="1" value="1" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-center">
                    </div>
                    <button type="submit" class="w-full md:w-auto bg-green-500 hover:bg-green-600 text-white p-2 rounded-md transition flex justify-center items-center h-[42px] px-4">
                        <i class="fa-solid fa-plus"></i><span class="ml-2 md:hidden">Tambah</span>
                    </button>
                </form>

                <!-- Tabel Item -->
                <div class="border rounded-md overflow-hidden flex-1 flex flex-col max-h-[300px]">
                    <div class="overflow-y-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50 sticky top-0">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Barang</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Harga</th>
                                    <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Qty</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Subtotal</th>
                                    <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="itemList" class="bg-white divide-y divide-gray-200">
                                <!-- Data item akan ditambahkan di sini melalui JS -->
                                <tr>
                                    <td colspan="5" class="px-4 py-8 text-center text-gray-400 italic">Belum ada barang ditambahkan.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Pembayaran -->
                <div class="mt-4 pt-4 border-t border-gray-200">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-lg font-bold text-gray-700">Total Tagihan:</span>
                        <span id="totalAmountDisplay" class="text-2xl font-bold text-blue-600">Rp 0</span>
                    </div>
                    <div class="flex gap-4 items-center">
                        <div class="flex-1">
                            <label class="block text-sm font-medium text-gray-600 mb-1">Uang Dibayar (Rp)</label>
                            <input type="number" id="cashAmount" placeholder="Masukkan jumlah uang" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-lg font-semibold">
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm font-medium text-gray-600 mb-1">Kembalian</label>
                            <div id="changeAmountDisplay" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-md text-lg font-semibold text-gray-500 h-[46px] flex items-center">-</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Kolom Kanan: Preview & Cetak -->
        <div class="w-full md:w-1/2 lg:w-2/5 flex flex-col h-full bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-700 flex items-center gap-2">
                    <i class="fa-solid fa-eye text-gray-400"></i> Preview Struk
                </h2>
                <div class="flex gap-2">
                    <button id="clearBtn" class="px-3 py-1.5 text-sm text-red-600 bg-red-50 hover:bg-red-100 rounded border border-red-200 transition">
                        <i class="fa-solid fa-trash-can"></i> Reset
                    </button>
                    <!-- Tombol cetak, akan diaktifkan jika printer terhubung atau mode simulasi -->
                    <button id="printBtn" class="px-4 py-1.5 text-sm text-white bg-blue-600 hover:bg-blue-700 rounded shadow-sm transition font-medium flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-print"></i> Cetak Struk
                    </button>
                </div>
            </div>
            
            <!-- Area kertas struk -->
            <div class="flex-1 p-6 bg-gray-200 overflow-y-auto flex justify-center items-start">
                <div class="bg-white p-6 shadow-md w-[300px] min-h-[400px] struk-preview text-sm leading-tight border border-gray-300 relative" id="receiptPaper">
                    <!-- Preview konten akan dirender ke sini oleh JS -->
                    <div id="previewContent" class="whitespace-pre-wrap break-words"></div>
                    <!-- Garis potong -->
                    <div class="absolute bottom-0 left-0 w-full border-t border-dashed border-gray-400 -mb-2"></div>
                </div>
            </div>
        </div>

    </main>

    <!-- Modal Pesan/Alert -->
    <div id="messageModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-lg p-6 max-w-sm w-full mx-4 shadow-xl transform transition-all">
            <div class="flex items-center gap-3 mb-4">
                <div id="modalIcon" class="w-10 h-10 rounded-full flex items-center justify-center text-xl"></div>
                <h3 id="modalTitle" class="text-lg font-bold text-gray-800">Pesan</h3>
            </div>
            <p id="modalMessage" class="text-gray-600 mb-6"></p>
            <div class="flex justify-end">
                <button id="closeModalBtn" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded font-medium transition">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        // --- STATE APLIKASI ---
        let items = [];
        let total = 0;
        let connectionType = null; // 'serial' atau 'bluetooth'
        
        // State Serial
        let port = null;
        let writer = null;
        
        // State Bluetooth
        let bleDevice = null;
        let bleCharacteristic = null;

        // --- REFERENSI ELEMEN DOM ---
        // Form & Input
        const storeNameInput = document.getElementById('storeName');
        const storeAddressInput = document.getElementById('storeAddress');
        const storePhoneInput = document.getElementById('storePhone');
        const cashierNameInput = document.getElementById('cashierName');
        
        const itemForm = document.getElementById('itemForm');
        const itemNameInput = document.getElementById('itemName');
        const itemPriceInput = document.getElementById('itemPrice');
        const itemQtyInput = document.getElementById('itemQty');
        const cashAmountInput = document.getElementById('cashAmount');
        
        // Display
        const itemListTbody = document.getElementById('itemList');
        const totalAmountDisplay = document.getElementById('totalAmountDisplay');
        const changeAmountDisplay = document.getElementById('changeAmountDisplay');
        const previewContent = document.getElementById('previewContent');
        
        // Buttons & Status
        const connectSerialBtn = document.getElementById('connectSerialBtn');
        const connectBleBtn = document.getElementById('connectBleBtn');
        const printBtn = document.getElementById('printBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusBanner = document.getElementById('statusBanner');
        const statusText = document.getElementById('statusText');

        // Modal
        const modal = document.getElementById('messageModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalIcon = document.getElementById('modalIcon');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // --- KONFIGURASI PRINTER THERMAL (ESC/POS COMMANDS) ---
        const ESC_POS = {
            INIT: [0x1B, 0x40], // Initialize printer
            ALIGN_LEFT: [0x1B, 0x61, 0x00],
            ALIGN_CENTER: [0x1B, 0x61, 0x01],
            ALIGN_RIGHT: [0x1B, 0x61, 0x02],
            BOLD_ON: [0x1B, 0x45, 0x01],
            BOLD_OFF: [0x1B, 0x45, 0x00],
            DOUBLE_HEIGHT: [0x1B, 0x21, 0x10],
            NORMAL_SIZE: [0x1B, 0x21, 0x00],
            CUT_PAPER: [0x1D, 0x56, 0x41, 0x10], // Partial cut
            NEW_LINE: [0x0A],
            LINE_SPACING_DEFAULT: [0x1B, 0x32]
        };

        const MAX_CHARS_PER_LINE = 32; // Standard untuk printer 58mm (sesuaikan jika 80mm, biasanya 48)

        // --- FUNGSI HELPER UTILITY ---
        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        }

        function showMessage(title, message, type = 'info') {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            
            modalIcon.className = 'w-10 h-10 rounded-full flex items-center justify-center text-xl ' + 
                (type === 'error' ? 'bg-red-100 text-red-600' : 
                 type === 'success' ? 'bg-green-100 text-green-600' : 
                 type === 'warning' ? 'bg-yellow-100 text-yellow-600' : 
                 'bg-blue-100 text-blue-600');
            
            modalIcon.innerHTML = 
                type === 'error' ? '<i class="fa-solid fa-xmark"></i>' : 
                type === 'success' ? '<i class="fa-solid fa-check"></i>' : 
                type === 'warning' ? '<i class="fa-solid fa-triangle-exclamation"></i>' : 
                '<i class="fa-solid fa-info"></i>';

            modal.classList.remove('hidden');
        }

        closeModalBtn.addEventListener('click', () => modal.classList.add('hidden'));

        // Pad string untuk layout nota (kiri - spasi - kanan)
        function padSpace(leftStr, rightStr, totalLen = MAX_CHARS_PER_LINE) {
            let leftStrConv = String(leftStr);
            let rightStrConv = String(rightStr);
            
            let spacesNeeded = totalLen - (leftStrConv.length + rightStrConv.length);
            if (spacesNeeded < 1) spacesNeeded = 1; // Minimal 1 spasi
            
            return leftStrConv + ' '.repeat(spacesNeeded) + rightStrConv;
        }

        function createLine(char = '-') {
            return char.repeat(MAX_CHARS_PER_LINE);
        }

        function centerText(text, totalLen = MAX_CHARS_PER_LINE) {
            let str = String(text);
            if(str.length >= totalLen) return str.substring(0, totalLen);
            let padding = Math.floor((totalLen - str.length) / 2);
            return ' '.repeat(padding) + str;
        }

        // --- LOGIKA APLIKASI KASIR ---
        itemForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = itemNameInput.value.trim();
            const price = parseFloat(itemPriceInput.value);
            const qty = parseInt(itemQtyInput.value);

            if (!name || isNaN(price) || isNaN(qty) || price < 0 || qty < 1) {
                showMessage("Input Tidak Valid", "Mohon periksa kembali input barang Anda.", "warning");
                return;
            }

            const subtotal = price * qty;
            items.push({ id: Date.now(), name, price, qty, subtotal });
            
            // Reset input form
            itemNameInput.value = '';
            itemPriceInput.value = '';
            itemQtyInput.value = '1';
            itemNameInput.focus();

            updateUI();
        });

        function updateUI() {
            // Update Tabel
            itemListTbody.innerHTML = '';
            total = 0;

            if (items.length === 0) {
                itemListTbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400 italic">Belum ada barang ditambahkan.</td></tr>`;
            } else {
                items.forEach((item, index) => {
                    total += item.subtotal;
                    const tr = document.createElement('tr');
                    tr.className = index % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                    tr.innerHTML = `
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-800 font-medium">${item.name}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-600 text-right">${formatRupiah(item.price).replace('Rp', '')}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-600 text-center">${item.qty}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-800 text-right font-medium">${formatRupiah(item.subtotal).replace('Rp', '')}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-center">
                            <button onclick="removeItem(${item.id})" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 w-8 h-8 rounded-full transition inline-flex justify-center items-center" title="Hapus">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    `;
                    itemListTbody.appendChild(tr);
                });
            }

            // Update Total
            totalAmountDisplay.textContent = formatRupiah(total);
            calculateChange();
            
            // Update Preview
            generatePreview();
        }

        // Ekspos fungsi ke window agar bisa dipanggil dari atribut onclick HTML
        window.removeItem = function(id) {
            items = items.filter(item => item.id !== id);
            updateUI();
        }

        cashAmountInput.addEventListener('input', calculateChange);

        function calculateChange() {
            const cash = parseFloat(cashAmountInput.value) || 0;
            if (cash > 0) {
                const change = cash - total;
                if (change >= 0) {
                    changeAmountDisplay.textContent = formatRupiah(change);
                    changeAmountDisplay.classList.remove('text-red-500', 'text-gray-500');
                    changeAmountDisplay.classList.add('text-green-600', 'font-bold');
                } else {
                    changeAmountDisplay.textContent = "Uang Kurang!";
                    changeAmountDisplay.classList.remove('text-green-600', 'text-gray-500');
                    changeAmountDisplay.classList.add('text-red-500', 'font-bold');
                }
            } else {
                changeAmountDisplay.textContent = "-";
                changeAmountDisplay.className = "w-full p-2 bg-gray-50 border border-gray-200 rounded-md text-lg font-semibold text-gray-500 h-[46px] flex items-center";
            }
            generatePreview(); // Update preview saat uang dibayar berubah
        }

        clearBtn.addEventListener('click', () => {
            if(items.length === 0) return;
            // Gunakan konfirmasi bawaan browser untuk kemudahan (atau ganti modal custom jika diinginkan)
            // Sesuai instruksi, kita TIDAK boleh pakai alert/confirm. Gunakan modal custom.
            items = [];
            cashAmountInput.value = '';
            updateUI();
            showMessage("Berhasil", "Data transaksi telah direset.", "success");
        });

        // Event listener input toko untuk update preview realtime
        [storeNameInput, storeAddressInput, storePhoneInput, cashierNameInput].forEach(input => {
            input.addEventListener('input', generatePreview);
        });

        // --- GENERATE PREVIEW TEKS & STRUKTUR CETAK ---
        function buildReceiptText() {
            const storeName = storeNameInput.value.trim() || 'Toko Anda';
            const storeAddress = storeAddressInput.value.trim() || '-';
            const storePhone = storePhoneInput.value.trim() || '-';
            const cashier = cashierNameInput.value.trim() || 'Admin';
            
            const date = new Date();
            const dateStr = date.toLocaleDateString('id-ID');
            const timeStr = date.toLocaleTimeString('id-ID', { hour12: false });
            const cash = parseFloat(cashAmountInput.value) || 0;
            const change = cash - total;

            let text = "";
            
            // Header
            text += centerText(storeName) + "\n";
            text += centerText(storeAddress) + "\n";
            text += centerText(storePhone) + "\n";
            text += createLine() + "\n";
            
            // Info Kasir & Waktu
            text += padSpace(`Tgl: ${dateStr}`, `Jam: ${timeStr}`) + "\n";
            text += padSpace(`Kasir: ${cashier}`, "") + "\n";
            text += createLine() + "\n";
            
            // Daftar Item
            items.forEach(item => {
                text += item.name + "\n";
                const qtyPrice = `${item.qty}x ${formatRupiah(item.price).replace('Rp', '')}`;
                const subtotalStr = formatRupiah(item.subtotal).replace('Rp', '');
                text += padSpace(qtyPrice, subtotalStr) + "\n";
            });
            
            text += createLine() + "\n";
            
            // Pembayaran
            text += padSpace("TOTAL:", formatRupiah(total).replace('Rp', '')) + "\n";
            text += padSpace("TUNAI:", formatRupiah(cash).replace('Rp', '')) + "\n";
            text += padSpace("KEMBALI:", formatRupiah(change >= 0 ? change : 0).replace('Rp', '')) + "\n";
            
            text += createLine() + "\n";
            text += centerText("Terima Kasih") + "\n";
            text += centerText("Atas Kunjungan Anda") + "\n";
            text += "\n\n"; // Ekstra space di bawah struk

            return text;
        }

        function generatePreview() {
            const text = buildReceiptText();
            previewContent.textContent = text;
        }

        // --- WEB SERIAL API LOGIC (KONEKSI PRINTER USB/COM) ---
        
        // Cek dukungan Web Serial API
        if (!('serial' in navigator)) {
            connectSerialBtn.style.display = 'none';
        }

        // Cek dukungan Web Bluetooth API
        if (!('bluetooth' in navigator)) {
            connectBleBtn.style.display = 'none';
        }

        // Fungsi untuk Encode Teks ke Uint8Array
        function encodeText(text) {
            const encoder = new TextEncoder();
            return Array.from(encoder.encode(text)); // Jadikan array biasa agar mudah digabung
        }

        connectSerialBtn.addEventListener('click', async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                writer = port.writable.getWriter();
                
                connectionType = 'serial';
                updateStatus(true, "Terhubung via USB/Serial Port.");
                
                connectSerialBtn.innerHTML = '<i class="fa-solid fa-plug-circle-check"></i> Serial OK';
                connectSerialBtn.classList.replace('text-blue-600', 'text-green-600');
            } catch (err) {
                if (err.name !== 'NotFoundError') showMessage("Gagal", err.message, "error");
            }
        });

        connectBleBtn.addEventListener('click', async () => {
            try {
                // UUID layanan umum untuk berbagai merek mini thermal printer BLE
                const optionalServices = [
                    '000018f0-0000-1000-8000-00805f9b34fb', 
                    'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
                    '0000fee7-0000-1000-8000-00805f9b34fb',
                    '0000ffe0-0000-1000-8000-00805f9b34fb', // SPP over BLE
                    '49535343-fe7d-4ae5-8fa9-9fafd205e455'
                ];

                bleDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: optionalServices
                });

                const server = await bleDevice.gatt.connect();
                
                // Cari service dan characteristic yang bisa ditulisi
                const services = await server.getPrimaryServices();
                let foundCharacteristic = null;

                for (const service of services) {
                    const characteristics = await service.getCharacteristics();
                    for (const char of characteristics) {
                        if (char.properties.write || char.properties.writeWithoutResponse) {
                            foundCharacteristic = char;
                            break;
                        }
                    }
                    if (foundCharacteristic) break;
                }

                if (!foundCharacteristic) {
                    throw new Error("Tidak menemukan karakteristik Bluetooth yang bisa ditulisi pada perangkat ini.");
                }

                bleCharacteristic = foundCharacteristic;
                connectionType = 'bluetooth';
                
                updateStatus(true, "Terhubung via Bluetooth BLE (" + bleDevice.name + ").");
                connectBleBtn.innerHTML = '<i class="fa-brands fa-bluetooth"></i> BT OK';
                connectBleBtn.classList.replace('text-blue-600', 'text-green-600');

                // Listener jika Bluetooth terputus
                bleDevice.addEventListener('gattserverdisconnected', onDisconnect);

            } catch (err) {
                if (err.name !== 'NotFoundError') showMessage("Gagal Bluetooth", err.message, "error");
            }
        });

        function updateStatus(isConnected, text) {
            if (isConnected) {
                statusBanner.className = "bg-green-100 border-l-4 border-green-500 text-green-700 p-3 text-sm flex items-center gap-2";
            } else {
                statusBanner.className = "bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-3 text-sm flex items-center gap-2";
            }
            statusText.textContent = text;
        }

        function onDisconnect() {
            connectionType = null;
            port = null;
            writer = null;
            bleDevice = null;
            bleCharacteristic = null;
            updateStatus(false, "Koneksi printer terputus.");
            connectSerialBtn.innerHTML = '<i class="fa-brands fa-usb"></i> USB / COM';
            connectSerialBtn.classList.replace('text-green-600', 'text-blue-600');
            connectBleBtn.innerHTML = '<i class="fa-brands fa-bluetooth"></i> Bluetooth';
            connectBleBtn.classList.replace('text-green-600', 'text-blue-600');
        }

        // Listen for disconnect events untuk Serial
        navigator.serial?.addEventListener("disconnect", onDisconnect);

        async function writeToBluetooth(dataArray) {
            const chunkSize = 20; // Limit aman MTU BLE biasanya 20 bytes
            for (let i = 0; i < dataArray.length; i += chunkSize) {
                const chunk = new Uint8Array(dataArray.slice(i, i + chunkSize));
                await bleCharacteristic.writeValue(chunk);
                // Beri jeda sangat kecil agar buffer hardware printer murahan tidak penuh
                await new Promise(resolve => setTimeout(resolve, 10)); 
            }
        }

        // --- FUNGSI CETAK KE PRINTER ---
        printBtn.addEventListener('click', async () => {
            if (items.length === 0) {
                showMessage("Kosong", "Tidak ada barang untuk dicetak.", "warning");
                return;
            }

            const cash = parseFloat(cashAmountInput.value) || 0;
            if (cash > 0 && cash < total) {
                showMessage("Peringatan", "Uang bayar kurang dari total tagihan!", "warning");
                return;
            }

            if (!connectionType) {
                showMessage("Printer Tidak Terhubung", "Harap hubungkan printer via USB atau Bluetooth terlebih dahulu.", "warning");
                return;
            }

            try {
                // Kumpulkan semua data byte dalam satu array
                let printData = [];
                
                // 1. Inisialisasi
                printData.push(...ESC_POS.INIT);
                printData.push(...ESC_POS.ALIGN_CENTER);
                
                // 2. Ambil data teks
                const receiptText = buildReceiptText();
                printData.push(...encodeText(receiptText));
                
                // 3. Perintah Potong Kertas (beri spasi dulu)
                for(let i=0; i<3; i++) printData.push(...ESC_POS.NEW_LINE);
                printData.push(...ESC_POS.CUT_PAPER);

                // 4. Kirim data sesuai tipe koneksi
                if (connectionType === 'serial') {
                    await writer.write(new Uint8Array(printData));
                } else if (connectionType === 'bluetooth') {
                    await writeToBluetooth(printData);
                }

                showMessage("Sukses", "Data telah dikirim ke printer.", "success");

            } catch (err) {
                console.error("Gagal mencetak:", err);
                showMessage("Error Cetak", "Terjadi kesalahan saat mengirim data. Pastikan printer menyala dan kertas tersedia. Error: " + err.message, "error");
            }
        });

    </script>
</body>
